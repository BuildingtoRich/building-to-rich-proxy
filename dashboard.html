<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Building to Rich — Income Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#161616;--border:#1e1e1e;
  --text:#f0ede8;--muted:#444;--muted2:#666;
  --green:#c8f55a;--red:#f55a5a;--blue:#5a9ef5;--amber:#f5a623;
  --font-head:'Syne',sans-serif;--font-mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);padding:1.5rem;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.brand{font-family:var(--font-head);font-size:1rem;font-weight:700;letter-spacing:0.04em;color:var(--green)}
.subtitle{font-size:0.6rem;color:var(--muted2);margin-top:2px}
.refresh-btn{font-family:var(--font-mono);font-size:0.6rem;padding:0.35rem 0.9rem;cursor:pointer;border:1px solid var(--green);color:var(--green);background:transparent;text-transform:uppercase;letter-spacing:0.08em}
.refresh-btn:hover{background:rgba(200,245,90,0.07)}
.refresh-btn:disabled{opacity:0.4;cursor:not-allowed}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-bottom:1px}
.kpi{background:var(--bg);padding:1.25rem 1.25rem 1rem}
.kpi-label{font-size:0.58rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem}
.kpi-val{font-family:var(--font-head);font-size:1.75rem;font-weight:700;line-height:1}
.kpi-sub{font-size:0.58rem;color:var(--muted);margin-top:0.35rem}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-amber{color:var(--amber)}
.stream-grid{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.stream-row{background:var(--bg);display:grid;grid-template-columns:200px 1fr 1fr 1fr 1fr 1fr;align-items:center}
.stream-row.header-row{background:var(--surface2)}
.stream-row.subrow{background:var(--surface2)}
.stream-row.overhead-row{background:var(--surface2)}
.cell{padding:0.7rem 1rem;font-size:0.7rem;display:flex;align-items:center}
.cell.right{justify-content:flex-end}
.col-head{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em}
.col-default{color:var(--muted2)}.col-net{color:var(--green)}.col-cost{color:var(--red)}.col-hours{color:var(--blue)}.col-rate{color:var(--amber)}
.s-name{font-size:0.72rem;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.chevron{font-size:0.5rem;color:var(--muted2);transition:transform 0.15s;display:inline-block}
.chevron.open{transform:rotate(90deg)}
.tag{font-size:0.52rem;padding:1px 5px;border:1px solid;text-transform:uppercase;letter-spacing:0.06em}
.tag-active{color:var(--green);border-color:rgba(200,245,90,0.25)}
.tag-testing{color:var(--amber);border-color:rgba(245,166,35,0.25)}
.tag-paused{color:var(--muted2);border-color:var(--border)}
.tag-dead{color:var(--red);border-color:rgba(245,90,90,0.25)}
.sub-label{font-size:0.65rem;color:var(--muted2);padding-left:1rem;display:flex;align-items:center;gap:6px}
.sub-label::before{content:'└';color:var(--border);margin-right:4px}
.val{font-size:0.7rem}
.status-bar{padding:0.6rem 1rem;font-size:0.62rem;margin-bottom:1px;display:flex;align-items:center;gap:0.5rem}
.status-bar.loading{background:var(--surface);color:var(--muted2)}
.status-bar.error{background:rgba(245,90,90,0.08);color:var(--red);border:1px solid rgba(245,90,90,0.2)}
.status-bar.success{background:rgba(200,245,90,0.06);color:var(--green);border:1px solid rgba(200,245,90,0.15)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.spinner{width:10px;height:10px;border:1px solid var(--muted);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="brand">Building to Rich</div>
    <div class="subtitle">Income Experiment Tracker — All Time</div>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>
<div id="status-bar" class="status-bar loading">
  <div class="spinner"></div>
  <span>Connecting to Notion...</span>
</div>
<div class="kpis">
  <div class="kpi"><div class="kpi-label">Net Income</div><div class="kpi-val c-green" id="k-net">$0.00</div><div class="kpi-sub">Revenue minus all costs</div></div>
  <div class="kpi"><div class="kpi-label">Total Invested</div><div class="kpi-val c-red" id="k-cost">$0.00</div><div class="kpi-sub">All costs to date</div></div>
  <div class="kpi"><div class="kpi-label">Total Hours</div><div class="kpi-val c-blue" id="k-hours">0h</div><div class="kpi-sub" id="k-split">0h startup · 0h maintenance</div></div>
  <div class="kpi"><div class="kpi-label">Effective Hourly Rate</div><div class="kpi-val c-amber" id="k-rate">$0/hr</div><div class="kpi-sub" id="k-roi">ROI: 0%</div></div>
</div>
<div class="stream-grid" id="stream-grid">
  <div class="stream-row header-row">
    <div class="cell"><span class="col-head col-default">Stream</span></div>
    <div class="cell right"><span class="col-head col-net">Net Income</span></div>
    <div class="cell right"><span class="col-head col-cost">Invested</span></div>
    <div class="cell right"><span class="col-head col-hours">Hours</span></div>
    <div class="cell right"><span class="col-head col-rate">$/hr</span></div>
    <div class="cell right"><span class="col-head col-default">ROI</span></div>
  </div>
</div>
<script>
const PROXY = 'https://building-to-rich-proxy-production.up.railway.app/data';
const STREAMS = ['Amazon FBA','Newsletter','Socials','Consulting','Digital Products'];
const SUBCATS = {
  'Amazon FBA':['Product 1'],
  'Newsletter':['Newsletter'],
  'Socials':['Socials'],
  'Consulting':['Consulting'],
  'Digital Products':['Notion Dashboard'],
  'Overhead':['General OH']
};
let entries = [];
let expanded = {};
function f$(n){return(n<0?'-':'')+'$'+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function fh(n){return(Math.round(n*10)/10)+'h'}
function pct(n){return Math.round(n)+'%'}
function setStatus(type,msg){
  const bar=document.getElementById('status-bar');
  bar.className='status-bar '+type;
  bar.innerHTML=type==='loading'
    ?`<div class="spinner"></div><span>${msg}</span>`
    :`<div class="dot"></div><span>${msg}</span>`;
}
async function loadData(){
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true;
  setStatus('loading','Fetching from Notion...');
  try{
    const res=await fetch(PROXY);
    if(!res.ok) throw new Error(`Server returned ${res.status}`);
    entries=await res.json();
    setStatus('success',`${entries.length} entries loaded — last refreshed ${new Date().toLocaleTimeString()}`);
  }catch(err){
    setStatus('error','Could not reach proxy — '+err.message);
  }
  render();
  btn.disabled=false;
}
function calc(fn){
  const e=entries.filter(fn);
  const rev=e.filter(x=>x.type==='Revenue').reduce((s,x)=>s+(x.amount||0),0);
  const cost=e.filter(x=>x.type==='Cost').reduce((s,x)=>s+(x.amount||0),0);
  const hours=e.filter(x=>x.type==='Time').reduce((s,x)=>s+(x.amount||0),0);
  const sH=e.filter(x=>x.type==='Time'&&x.phase==='Startup').reduce((s,x)=>s+(x.amount||0),0);
  const mH=e.filter(x=>x.type==='Time'&&x.phase==='Maintenance').reduce((s,x)=>s+(x.amount||0),0);
  const net=rev-cost;
  return{rev,cost,net,hours,sH,mH,rate:hours>0?net/hours:0,roi:cost>0?(net/cost)*100:0};
}
function lastStatus(fn){
  const e=entries.filter(fn);
  return e.length?(e[e.length-1].status||'testing').toLowerCase():'testing';
}
function numCell(val,colorClass,fmt){
  return`<div class="cell right"><span class="val ${colorClass}">${fmt(val)}</span></div>`;
}
function toggleExpand(s){expanded[s]=!expanded[s];render();}
function render(){
  const g=calc(()=>true);
  const kNet=document.getElementById('k-net');
  kNet.textContent=f$(g.net);
  kNet.className='kpi-val '+(g.net>=0?'c-green':'c-red');
  document.getElementById('k-cost').textContent=f$(g.cost);
  document.getElementById('k-hours').textContent=fh(g.hours);
  document.getElementById('k-split').textContent=fh(g.sH)+' startup · '+fh(g.mH)+' maintenance';
  document.getElementById('k-rate').textContent=f$(g.rate)+'/hr';
  document.getElementById('k-roi').textContent='ROI: '+pct(g.roi);
  const grid=document.getElementById('stream-grid');
  while(grid.children.length>1)grid.removeChild(grid.lastChild);
  STREAMS.forEach(stream=>{
    const sc=calc(e=>e.stream===stream);
    const subs=SUBCATS[stream]||[];
    const isExp=expanded[stream];
    const status=lastStatus(e=>e.stream===stream);
    const row=document.createElement('div');
    row.className='stream-row';
    row.innerHTML=`
      <div class="cell" onclick="toggleExpand('${stream.replace(/'/g,"\\'")}')">
        <div class="s-name">
          <span class="chevron ${isExp?'open':''}">▶</span>
          ${stream}
          <span class="tag tag-${status}">${status}</span>
        </div>
      </div>
      ${numCell(sc.net,sc.net>=0?'c-green':'c-red',f$)}
      ${numCell(sc.cost,'c-red',f$)}
      ${numCell(sc.hours,'c-blue',fh)}
      <div class="cell right"><span class="val c-amber">${f$(sc.rate)}/hr</span></div>
      <div class="cell right"><span class="val" style="color:var(--muted2)">${pct(sc.roi)}</span></div>`;
    grid.appendChild(row);
    if(isExp){
      subs.forEach(sub=>{
        const sc2=calc(e=>e.stream===stream&&e.sub===sub);
        const st2=lastStatus(e=>e.stream===stream&&e.sub===sub);
        const sr=document.createElement('div');
        sr.className='stream-row subrow';
        sr.innerHTML=`
          <div class="cell"><div class="sub-label">${sub}<span class="tag tag-${st2}">${st2}</span></div></div>
          ${numCell(sc2.net,sc2.net>=0?'c-green':'c-red',f$)}
          ${numCell(sc2.cost,'c-red',f$)}
          ${numCell(sc2.hours,'c-blue',fh)}
          <div class="cell right"><span class="val c-amber">${f$(sc2.rate)}/hr</span></div>
          <div class="cell right"><span class="val" style="color:var(--muted2)">${pct(sc2.roi)}</span></div>`;
        grid.appendChild(sr);
      });
    }
  });
  const ov=calc(e=>e.stream==='Overhead');
  const ovr=document.createElement('div');
  ovr.className='stream-row overhead-row';
  ovr.innerHTML=`
    <div class="cell"><div class="s-name" style="color:var(--muted2);cursor:default">Overhead</div></div>
    <div class="cell right"><span class="val" style="color:var(--muted2)">—</span></div>
    <div class="cell right"><span class="val c-red">${f$(ov.cost)}</span></div>
    <div class="cell right"><span class="val c-blue">${fh(ov.hours)}</span></div>
    <div class="cell right"><span class="val" style="color:var(--muted2)">—</span></div>
    <div class="cell right"><span class="val" style="color:var(--muted2)">—</span></div>`;
  grid.appendChild(ovr);
}
loadData();
</script>
</body>
</html>
